<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Div-Eating Snake</title>
<link rel="stylesheet" href="_shared.css">
<style>
  html,body{height:100%;overflow:hidden}
  #scroller{height:100%;overflow:hidden}
  #content p{position:relative;transition:opacity .3s;z-index:2}
  .reveal-img{position:absolute;inset:-4px;border-radius:8px;z-index:1;opacity:0;transition:opacity .5s}
  #c{position:fixed;inset:0;z-index:5;pointer-events:none}
  #hud{position:fixed;left:16px;top:14px;z-index:6;font-family:"Segoe UI",sans-serif;font-weight:700;color:#178a5a}
</style></head>
<body>
  <div id="scroller"><div class="wrap" id="content"></div></div>
  <canvas id="c"></canvas>
  <div id="hud">🐍 Eaten: <span id="n">0</span> / <span id="t">0</span> paragraphs</div>
  <div class="hint">Use <b>arrow keys</b> / <b>WASD</b>. Steer the snake to <b>eat the paragraphs</b> and reveal what's underneath.</div>
  <script src="_shared.js"></script>
  <script>
  MX.fakeArticle(document.getElementById("content"),{accent:"#178a5a",brand:"THE SERPENT TIMES",
    title:"There Are Pictures Hidden Beneath This Text. Eat It to Find Them.",blocks:12,
    lede:"Each paragraph is food. Beneath each one is an image you cannot see until the snake has swallowed the words above it."});
  // attach hidden images under each paragraph
  const paras=[...document.querySelectorAll("#content p")];
  paras.forEach((p,i)=>{const img=document.createElement("div");img.className="reveal-img";
    img.style.background=`linear-gradient(${i*40}deg, hsl(${i*53%360},80%,55%), hsl(${(i*53+120)%360},80%,45%))`;
    p.appendChild(img);p.dataset.eaten="0";});
  document.getElementById("t").textContent=paras.length;

  const cv=document.getElementById("c"),x=cv.getContext("2d");
  let W,H;function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}rs();addEventListener("resize",rs);
  const CELL=20;
  let snake=[{x:8,y:8}],dir={x:1,y:0},grow=4,eaten=0;
  let food=null;
  function pickFood(){ // next uneaten paragraph, target its center cell
    const next=paras.find(p=>p.dataset.eaten==="0");
    if(!next){return null;}
    const r=next.getBoundingClientRect();
    return {el:next,cx:Math.floor((r.left+r.width/2)/CELL),cy:Math.floor((r.top+18)/CELL)};
  }
  food=pickFood();
  addEventListener("keydown",e=>{const k=e.key.toLowerCase();
    if((k==="arrowup"||k==="w")&&dir.y===0)dir={x:0,y:-1};
    else if((k==="arrowdown"||k==="s")&&dir.y===0)dir={x:0,y:1};
    else if((k==="arrowleft"||k==="a")&&dir.x===0)dir={x:-1,y:0};
    else if((k==="arrowright"||k==="d")&&dir.x===0)dir={x:1,y:0};
    if(["arrowup","arrowdown","arrowleft","arrowright"].includes(k))e.preventDefault();
  });
  let acc=0;
  function tick(){
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    const cols=Math.floor(W/CELL),rows=Math.floor(H/CELL);
    head.x=(head.x+cols)%cols;head.y=(head.y+rows)%rows;
    snake.unshift(head);
    if(grow>0)grow--;else snake.pop();
    if(food && Math.abs(head.x-food.cx)<=1 && Math.abs(head.y-food.cy)<=1){
      food.el.dataset.eaten="1";food.el.style.opacity="0.0";food.el.querySelector(".reveal-img").style.opacity="1";
      eaten++;document.getElementById("n").textContent=eaten;grow+=3;food=pickFood();
      if(!food){ const d=document.createElement("div");d.style.cssText="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;text-align:center;font-family:Segoe UI,sans-serif;color:#178a5a;background:#fff;padding:24px;border-radius:14px";
        d.innerHTML="<h2>🐍 Whole page devoured.</h2><div>Every hidden image is revealed.</div><a class='btn' href='#' id='rb' style='margin-top:12px'>Slither onward →</a>";document.body.appendChild(d);
        document.getElementById("rb").onclick=ev=>{ev.preventDefault();MX.exitToMansion();};}
    }
  }
  function draw(){
    requestAnimationFrame(draw);
    if(++acc%7!==0)return; // speed
    tick();
    x.clearRect(0,0,W,H);
    if(food){x.fillStyle="rgba(255,80,80,.9)";x.beginPath();x.arc(food.cx*CELL+CELL/2,food.cy*CELL+CELL/2,9,0,7);x.fill();}
    snake.forEach((s,i)=>{x.fillStyle=i===0?"#0c5":"#178a5a";
      const r=4;x.fillRect(s.x*CELL+2,s.y*CELL+2,CELL-4,CELL-4);
      if(i===0){x.fillStyle="#fff";x.fillRect(s.x*CELL+5,s.y*CELL+5,3,3);x.fillRect(s.x*CELL+CELL-8,s.y*CELL+5,3,3);}});
  }
  draw();
  </script>
</body></html>
