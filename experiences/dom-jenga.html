<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>DOM Jenga</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#15110a;font-family:"Segoe UI",sans-serif}
  #stage{position:relative;height:100%}
  .block{position:absolute;left:50%;height:46px;border-radius:6px;display:flex;align-items:center;justify-content:center;
    color:#2a1c08;font-weight:700;cursor:pointer;box-shadow:inset 0 -4px 0 rgba(0,0,0,.18),0 2px 6px rgba(0,0,0,.3);
    transition:none;user-select:none;font-size:14px;white-space:nowrap;overflow:hidden}
  .block:hover{filter:brightness(1.12)}
  #hud{position:fixed;left:16px;top:14px;z-index:5;color:#e9d2a0;font-weight:700}
  #stab{width:200px;height:12px;border:1px solid #b08a3a;border-radius:8px;margin-top:6px;overflow:hidden;background:#2a200f}
  #stabfill{height:100%;width:100%;background:linear-gradient(90deg,#2c7,#fc3,#e23)}
  #over{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:9;
    background:rgba(10,6,0,.85);color:#fff;text-align:center}
  .btn{margin-top:16px;background:#e2a23b;border:0;color:#201400;padding:12px 24px;border-radius:8px;font-weight:800;cursor:pointer}
  .hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:5;font-size:13px;color:#e9d2a0;background:rgba(0,0,0,.4);padding:8px 14px;border-radius:30px}
</style></head>
<body>
  <div id="stage"></div>
  <div id="hud">🧱 DOM JENGA<br>Blocks pulled: <span id="n">0</span><div id="stab"><div id="stabfill"></div></div></div>
  <div id="over"><h1 id="ot">💥 COLLAPSE</h1><p id="os">The layout fell apart. Session terminated.</p><button class="btn" id="rb">Rebuild the tower</button></div>
  <div class="hint">Click blocks to <b>pull them out</b> — but destabilize the tower too much and the whole site <b>collapses</b>.</div>
  <script>
  const stage=document.getElementById("stage");
  const LABELS=["<header>","<nav>","<main>","<article>","<section>","<aside>",".container",".row",".col",".card",
    ".hero",".grid",".flex",".wrapper",".content",".sidebar",".footer",".banner",".panel",".module",".widget",".stack"];
  const COLORS=["#d9a441","#caa05a","#bb8b3a","#d6b05e","#c79a4e","#b88141"];
  let blocks=[],pulled=0,instab=0,dead=false;
  function build(){
    stage.innerHTML="";blocks=[];pulled=0;instab=0;dead=false;
    document.getElementById("over").style.display="none";
    const N=22,bh=46;
    for(let i=0;i<N;i++){
      const b=document.createElement("div");b.className="block";
      const w=180+Math.random()*120;b.style.width=w+"px";
      b.style.bottom=(20+i*bh)+"px";b.style.marginLeft=(-(w/2)+(Math.random()*10-5))+"px";
      b.style.background=COLORS[i%COLORS.length];b.textContent=LABELS[i%LABELS.length];
      b.dataset.i=i;b.addEventListener("click",()=>pull(b));
      stage.appendChild(b);blocks.push({el:b,i,removed:false,vx:0,vy:0,vr:0,rot:0});
    }
    update();
  }
  function pull(el){
    if(dead)return;const idx=+el.dataset.i;const blk=blocks[idx];if(blk.removed)return;
    blk.removed=true;el.style.transition="transform .4s,opacity .4s";
    el.style.transform="translateX("+(Math.random()<.5?-1:1)*300+"px) rotate("+(Math.random()*60-30)+"deg)";el.style.opacity="0";
    setTimeout(()=>el.style.display="none",400);
    pulled++;document.getElementById("n").textContent=pulled;
    // instability: pulling low/middle blocks is riskier
    const below=blocks.filter(b=>!b.removed&&b.i<idx).length;
    instab+=8+ (idx<10?14:6) + Math.random()*10;
    document.getElementById("stabfill").style.width=Math.max(0,100-instab)+"%";
    if(instab>100||Math.random()<instab/260){collapse();}
  }
  function collapse(){
    dead=true;
    blocks.filter(b=>!b.removed).forEach(b=>{b.vx=(Math.random()-.5)*14;b.vy=-Math.random()*6;b.vr=(Math.random()-.5)*0.4;});
    let t=0;(function fall(){t++;let any=false;
      blocks.forEach(b=>{if(b.removed||b.el.style.display==="none")return;any=true;b.vy+=0.6;
        const cur=parseFloat(b.el.style.bottom);b.el.style.bottom=(cur-b.vy)+"px";
        b.rot+=b.vr;const ml=parseFloat(b.el.style.marginLeft)+b.vx;b.el.style.marginLeft=ml+"px";
        b.el.style.transform="rotate("+b.rot+"rad)";});
      if(t<120)requestAnimationFrame(fall);})();
    setTimeout(()=>{document.getElementById("over").style.display="flex";},900);
  }
  function update(){document.getElementById("stabfill").style.width=Math.max(0,100-instab)+"%";}
  document.getElementById("rb").onclick=build;
  build();
  // win if you survive pulling 10
  setInterval(()=>{if(!dead&&pulled>=10){document.getElementById("ot").textContent="🏆 STEADY HANDS";document.getElementById("os").textContent="You pulled 10 blocks without collapse. The tower respects you.";document.getElementById("over").style.display="flex";dead=true;}},400);
  </script>
</body></html>
