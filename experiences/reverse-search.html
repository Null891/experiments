<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Reverse Search</title>
<style>
  html,body{margin:0;height:100%;background:#0f1320;font-family:"Segoe UI",sans-serif;color:#e8ecf5;overflow:hidden}
  #box{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,92vw);text-align:center}
  .q{font-size:clamp(22px,4vw,34px);font-weight:700;line-height:1.3;margin-bottom:30px;min-height:90px}
  .btns{display:flex;gap:16px;justify-content:center}
  button{flex:1;max-width:200px;padding:18px;border:0;border-radius:12px;font-size:18px;font-weight:800;cursor:pointer;transition:transform .1s}
  button:hover{transform:translateY(-3px)}
  .yes{background:#1dd1a1;color:#021}.no{background:#ff5d5d;color:#200}
  #brand{position:fixed;left:16px;top:14px;font-weight:800;letter-spacing:1px;color:#6af}
  #count{position:fixed;right:16px;top:14px;color:#789}
  #guess{font-size:clamp(22px,4vw,32px)}
  .fade{animation:f .4s}@keyframes f{from{opacity:0;transform:translateY(10px)}}
</style></head>
<body>
  <div id="brand">◢ REVERSE SEARCH</div>
  <div id="count">question <span id="qn">1</span></div>
  <div id="box">
    <div class="q" id="q"></div>
    <div class="btns"><button class="yes" id="yes">Yes</button><button class="no" id="no">No</button></div>
  </div>
  <script>
  // It "searches you": progressively weirder yes/no questions, then guesses.
  const Q=[
    "Are you a human being? (be honest)",
    "Did you arrive here on purpose?",
    "Is it currently dark where you are?",
    "Have you ever pretended to read a Terms of Service?",
    "Do you trust your own browser history?",
    "Are you holding something warm right now?",
    "Would you describe yourself as 'extremely normal'?",
    "Have you blinked in the last 4 seconds?",
    "Is there a door behind you?",
    "Do you believe this website can see you?",
    "Are you avoiding something by being here?",
    "Did you feel that?",
    "Is the thing you actually wanted... a feeling, not a page?",
    "Have you been here before, in a dream?",
    "Are you ready to be told what you were looking for?"
  ];
  const GUESSES=[
    "You weren't searching for a page. You were searching for a quiet room with a door that locks.",
    "Based on your answers, you came here looking for permission to stop looking.",
    "You wanted the one website that doesn't want anything from you. Ironic.",
    "You were looking for proof that the internet can still surprise you. Found it.",
    "What you wanted was a reason to keep clicking. The mansion provides."
  ];
  let i=0;const ans=[];
  function show(){
    const q=document.getElementById("q");
    if(i>=Q.length){guess();return;}
    document.getElementById("qn").textContent=i+1;
    q.textContent=Q[i];q.classList.remove("fade");void q.offsetWidth;q.classList.add("fade");
  }
  function pick(v){ans.push(v);i++;show();}
  document.getElementById("yes").onclick=()=>pick(1);
  document.getElementById("no").onclick=()=>pick(0);
  function guess(){
    const yes=ans.filter(a=>a).length;
    const g=GUESSES[yes%GUESSES.length];
    document.getElementById("box").innerHTML=`<div id="guess">🔮 ${g}</div>
      <button class="yes" style="margin-top:26px;max-width:260px" onclick="location.reload()">Search me again</button>`;
    document.getElementById("count").textContent="guessed.";
  }
  show();
  </script>
</body></html>
