<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>The Blackout</title>
<link rel="stylesheet" href="_shared.css">
<style>
  html,body{height:100%;overflow:hidden;background:#000;cursor:none}
  #scroller{height:100%;overflow:auto}
  .wrap{color:#e8e2d0}
  #dark{position:fixed;inset:0;z-index:8;pointer-events:none}
  #meter{position:fixed;left:16px;top:14px;z-index:9;font-family:"Segoe UI",sans-serif;font-size:12px;color:#a85}
  #mbar{width:160px;height:8px;border:1px solid #642;border-radius:5px;overflow:hidden;margin-top:5px}
  #mf{height:100%;width:0;background:linear-gradient(90deg,#822,#fa3,#ff6)}
</style></head>
<body>
  <div id="scroller"><div class="wrap" id="content"></div></div>
  <canvas id="dark"></canvas>
  <div id="meter">🔥 friction / heat<div id="mbar"><div id="mf"></div></div>move fast to keep the fire alive</div>
  <script src="_shared.js"></script>
  <script>
  MX.fakeArticle(document.getElementById("content"),{accent:"#ffcf5a",brand:"THE DARK READING ROOM",
    title:"You Will Have to Make Your Own Light to Read This",blocks:11,
    lede:"This page is pitch black. Your cursor strikes sparks. Move quickly and steadily and the sparks become a fire bright enough to read by. Stop, and the dark returns."});
  const cv=document.getElementById("dark"),g=cv.getContext("2d");
  let W,H,DPR=Math.min(devicePixelRatio,2);
  function rs(){W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;g.setTransform(DPR,0,0,DPR,0,0);}rs();addEventListener("resize",rs);
  let mx=-99,my=-99,pmx=-99,pmy=-99,heat=0,sparks=[];
  addEventListener("mousemove",e=>{pmx=mx;pmy=my;mx=e.clientX;my=e.clientY;
    const v=Math.hypot(mx-pmx,my-pmy);heat=Math.min(1,heat+v*0.0022);
    for(let i=0;i<Math.min(6,v/4);i++)sparks.push({x:mx,y:my,vx:(Math.random()-.5)*2,vy:-(Math.random()*2+.5),life:1,hue:20+Math.random()*30});});
  function frame(){
    requestAnimationFrame(frame);
    heat=Math.max(0,heat-0.006);
    document.getElementById("mf").style.width=(heat*100)+"%";
    // darkness layer
    g.globalCompositeOperation="source-over";
    g.fillStyle="rgba(0,0,0,0.86)";g.fillRect(0,0,W,H);
    // carve light hole based on heat (fire radius) at cursor
    if(mx>0){
      const R=40+heat*heat*240;
      g.globalCompositeOperation="destination-out";
      const grd=g.createRadialGradient(mx,my,0,mx,my,R);
      grd.addColorStop(0,"rgba(0,0,0,1)");grd.addColorStop(0.6,"rgba(0,0,0,"+(0.5+heat*0.5)+")");grd.addColorStop(1,"rgba(0,0,0,0)");
      g.fillStyle=grd;g.beginPath();g.arc(mx,my,R,0,7);g.fill();
      // warm flame glow on top
      g.globalCompositeOperation="lighter";
      const fg=g.createRadialGradient(mx,my,0,mx,my,R*0.8);
      fg.addColorStop(0,`rgba(255,180,60,${0.10+heat*0.18})`);fg.addColorStop(1,"rgba(255,80,0,0)");
      g.fillStyle=fg;g.beginPath();g.arc(mx,my,R*0.8,0,7);g.fill();
    }
    // sparks
    g.globalCompositeOperation="lighter";
    sparks=sparks.filter(s=>s.life>0);
    sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=0.04;s.life-=0.02;
      g.fillStyle=`hsla(${s.hue},100%,60%,${s.life})`;g.beginPath();g.arc(s.x,s.y,1.6,0,7);g.fill();});
    g.globalCompositeOperation="source-over";
    // cursor ember
    if(mx>0){g.fillStyle="#ffd23f";g.beginPath();g.arc(mx,my,2.5,0,7);g.fill();}
  }
  frame();
  </script>
</body></html>
