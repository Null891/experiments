<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Password Is the Page</title>
<link rel="stylesheet" href="_shared.css">
<style>
  html,body{height:100%;overflow:hidden}
  #scroller{height:100%;overflow:auto;padding-bottom:120px}
  #gate{position:fixed;left:0;right:0;bottom:0;z-index:10;background:#14161d;color:#fff;padding:14px 18px;
    display:flex;gap:10px;align-items:center;font-family:"Segoe UI",sans-serif;box-shadow:0 -6px 24px rgba(0,0,0,.3)}
  #gate input{flex:1;padding:11px;border-radius:8px;border:1px solid #333;background:#0e0f15;color:#fff;font-family:monospace}
  #gate button{padding:11px 18px;border:0;border-radius:8px;background:#2a6cff;color:#fff;font-weight:800;cursor:pointer}
  #status{font-size:13px;min-width:130px}
  .ok{color:#3dff7a}.bad{color:#ff6b6b}
  #copyhint{position:fixed;right:16px;top:14px;z-index:9;background:rgba(20,16,30,.85);color:#cfe;font-family:"Segoe UI",sans-serif;font-size:12px;padding:8px 12px;border-radius:8px}
</style></head>
<body>
  <div id="scroller"><div class="wrap" id="content"></div></div>
  <div id="copyhint">tip: triple-click + Ctrl+A inside the article, then Ctrl+C 😈</div>
  <div id="gate">
    <span id="status">🔒 locked</span>
    <input id="pw" placeholder="paste the ENTIRE article here, exactly" autocomplete="off">
    <button id="go">Unlock</button>
  </div>
  <div class="hint">The password to the next page is <b>this entire article</b>. Copy it perfectly and paste it below.</div>
  <script src="_shared.js"></script>
  <script>
  // generate a fixed article and remember its exact text as the password
  MX.fakeArticle(document.getElementById("content"),{accent:"#2a6cff",brand:"THE PASSPHRASE PRESS",
    title:"This Entire Article Is the Password",blocks:5,
    lede:"Every word below, in order, is the key to the next page. Miss a single character and the door stays shut. We did warn you."});
  const article=document.getElementById("content");
  // password = normalized text content of the article
  const norm=s=>s.replace(/\s+/g," ").trim();
  const PASSWORD=norm(article.innerText);
  const status=document.getElementById("status");
  function check(){
    const v=norm(document.getElementById("pw").value);
    if(!v){status.textContent="🔒 locked";status.className="";return;}
    if(v===PASSWORD){status.textContent="✓ unlocked!";status.className="ok";
      setTimeout(()=>{document.body.innerHTML="<div style='display:flex;height:100vh;align-items:center;justify-content:center;flex-direction:column;font-family:Segoe UI;background:#0d1117;color:#fff;text-align:center'><h1>🔓 Access granted</h1><p>You copied "+PASSWORD.length+" characters perfectly. Inhuman. Welcome.</p></div>";},500);
    } else {
      // show how close they got
      let i=0;while(i<v.length&&i<PASSWORD.length&&v[i]===PASSWORD[i])i++;
      const pct=Math.floor(i/PASSWORD.length*100);
      status.innerHTML=`<span class="bad">✗ ${pct}% match</span><br><span style="font-size:11px;opacity:.7">first error at char ${i}</span>`;
      status.className="";
    }
  }
  document.getElementById("go").onclick=check;
  document.getElementById("pw").addEventListener("input",check);
  </script>
</body></html>
