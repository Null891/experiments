<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>The Blockchain Labyrinth</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c0e08;color:#d8e0b0;font-family:"Consolas",monospace}
  #c{position:fixed;inset:0;margin:auto}
  #hud{position:fixed;left:16px;top:14px;z-index:3;font-size:12px;line-height:1.7;background:rgba(8,10,6,.7);padding:10px 14px;border-radius:8px}
  #hud .h{color:#b9a14a;word-break:break-all;max-width:300px}
  #blocknum{font-size:20px;font-weight:800;color:#d8e0b0}
  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:3;font-size:13px;background:rgba(10,12,6,.8);padding:8px 14px;border-radius:30px}
  .hint b{background:#d8e0b0;color:#111;border-radius:4px;padding:0 6px}
</style></head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">⛓ BLOCK <span id="blocknum">…</span><br>hash: <span class="h" id="hash">…</span><br>
    <span id="status">find the green exit before the next block mints</span></div>
  <div class="hint">Move with <b>arrow keys</b>/<b>WASD</b>. Each new block <b>re-mints the maze walls</b> from its hash.</div>
  <script>
  const cv=document.getElementById("c"),x=cv.getContext("2d");
  const N=21,CELL=26;cv.width=cv.height=N*CELL;
  let maze,player={x:1,y:1},exit={x:N-2,y:N-2},block=19834712,hash="";
  function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  async function sha(s){const d=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return [...new Uint8Array(d)].map(b=>b.toString(16).padStart(2,"0")).join("");}
  function genMaze(seed){
    const r=mulberry(seed);
    const m=Array.from({length:N},()=>Array(N).fill(1)); // 1=wall
    function carve(cx,cy){m[cy][cx]=0;const dirs=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>r()-0.5);
      for(const[dx,dy]of dirs){const nx=cx+dx,ny=cy+dy;if(nx>0&&nx<N-1&&ny>0&&ny<N-1&&m[ny][nx]===1){m[cy+dy/2][cx+dx/2]=0;carve(nx,ny);}}}
    carve(1,1);m[1][1]=0;m[N-2][N-2]=0;m[N-3][N-2]=0;m[N-2][N-3]=0;
    return m;
  }
  async function newBlock(){
    block++;hash=await sha(block+":"+Date.now()+":"+Math.random());
    document.getElementById("blocknum").textContent=block.toLocaleString();
    document.getElementById("hash").textContent="0x"+hash.slice(0,40)+"…";
    const seed=parseInt(hash.slice(0,8),16);
    maze=genMaze(seed);
    // keep player in a valid cell
    if(maze[player.y][player.x]===1){player={x:1,y:1};}
    flash();
  }
  let flashT=0;function flash(){flashT=12;}
  function draw(){
    requestAnimationFrame(draw);
    x.fillStyle="#0c0e08";x.fillRect(0,0,cv.width,cv.height);
    if(!maze)return;
    for(let y=0;y<N;y++)for(let xx=0;xx<N;xx++){
      if(maze[y][xx]===1){const hv=parseInt(hash[(y*N+xx)%hash.length]||"0",16);
        x.fillStyle=`hsl(${60+hv*4},40%,${18+hv}%)`;x.fillRect(xx*CELL,y*CELL,CELL,CELL);}
    }
    // exit
    x.fillStyle="#3dff7a";x.fillRect(exit.x*CELL+5,exit.y*CELL+5,CELL-10,CELL-10);
    // player
    x.fillStyle="#ffd23f";x.beginPath();x.arc(player.x*CELL+CELL/2,player.y*CELL+CELL/2,CELL/2-5,0,7);x.fill();
    if(flashT>0){flashT--;x.fillStyle=`rgba(185,161,74,${flashT/30})`;x.fillRect(0,0,cv.width,cv.height);}
  }
  function move(dx,dy){const nx=player.x+dx,ny=player.y+dy;
    if(nx>=0&&nx<N&&ny>=0&&ny<N&&maze[ny][nx]===0){player.x=nx;player.y=ny;
      if(nx===exit.x&&ny===exit.y){document.getElementById("status").innerHTML="✓ <b style='color:#3dff7a'>TRANSACTION CONFIRMED</b> — you escaped the block.";}}}
  addEventListener("keydown",e=>{const k=e.key.toLowerCase();
    if(k==="arrowup"||k==="w")move(0,-1);else if(k==="arrowdown"||k==="s")move(0,1);
    else if(k==="arrowleft"||k==="a")move(-1,0);else if(k==="arrowright"||k==="d")move(1,0);
    if(k.startsWith("arrow"))e.preventDefault();});
  newBlock();draw();
  setInterval(newBlock,12000); // ~ Ethereum block time
  </script>
</body></html>
