<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>The Password Typo Requirement</title>
<style>
  html,body{margin:0;height:100%;background:#0f1320;color:#e8ecf5;font-family:"Segoe UI",sans-serif;overflow:hidden}
  #box{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(480px,92vw);background:#161b2a;
    border:1px solid #243049;border-radius:16px;padding:26px}
  h2{margin:0 0 4px}
  input{width:100%;padding:13px;border-radius:10px;border:1px solid #2a3550;background:#0d1117;color:#fff;font-size:16px;font-family:monospace}
  .rules{margin-top:16px;font-size:14px}
  .rule{display:flex;gap:8px;align-items:center;padding:4px 0}
  .rule .i{width:18px}
  .ok{color:#3dff7a}.no{color:#ff6b6b}
  #hglyphs{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
  #hglyphs span{cursor:pointer;font-size:20px;padding:3px 6px;background:#0d1117;border-radius:6px}
  #submit{margin-top:16px;width:100%;background:#2a6cff;border:0;color:#fff;padding:14px;border-radius:10px;font-weight:800;font-size:16px;cursor:pointer}
  #submit:disabled{opacity:.4;cursor:not-allowed}
  small{color:#7a8aa5}
</style></head>
<body>
  <div id="box">
    <h2>Create your password</h2>
    <small>Our security policy is… specific.</small>
    <input id="pw" placeholder="enter password" autocomplete="off" spellcheck="false">
    <div id="hglyphs"></div>
    <div class="rules" id="rules"></div>
    <button id="submit" disabled>Create Account</button>
  </div>
  <script>
  const HG=["𓂀","𓅓","𓆣","𓁹","𓃭","𓏏","𓊖","𓇳","𓋹","𓐍","𓀀","𓂁"];
  const hg=document.getElementById("hglyphs");
  HG.forEach(h=>{const s=document.createElement("span");s.textContent=h;s.onclick=()=>{pw.value+=h;check();pw.focus();};hg.appendChild(s);});
  // small dictionary of correctly-spelled words to detect a "misspelled English word"
  const DICT=new Set("the be to of and in that have it for not on with he as you do at this but his by from they we say her she or an will my one all would there their what so up out if about who get which go me when make can like time no just him know take people into year your good some could them see other than then now look only come its over think also back after use two how our work first well way even new want because any these give day most us the cat dog house water tree light music friend world happy".split(" "));
  function looksLikeMisspelling(tok){
    const w=tok.toLowerCase().replace(/[^a-z]/g,"");if(w.length<4)return false;
    if(DICT.has(w))return false; // correctly spelled = not a misspelling
    // is it within edit distance 1-2 of a real word?
    for(const d of DICT){if(Math.abs(d.length-w.length)<=2&&editClose(w,d))return true;}
    return false;
  }
  function editClose(a,b){let i=0,j=0,edits=0;
    // simple: count differing positions allowing 1 insert/delete
    if(Math.abs(a.length-b.length)>2)return false;
    let dp=Array.from({length:a.length+1},(_,x)=>Array(b.length+1).fill(0));
    for(let x=0;x<=a.length;x++)dp[x][0]=x;for(let y=0;y<=b.length;y++)dp[0][y]=y;
    for(let x=1;x<=a.length;x++)for(let y=1;y<=b.length;y++)dp[x][y]=Math.min(dp[x-1][y]+1,dp[x][y-1]+1,dp[x-1][y-1]+(a[x-1]===b[y-1]?0:1));
    return dp[a.length][b.length]>=1&&dp[a.length][b.length]<=2;
  }
  const pw=document.getElementById("pw");
  function check(){
    const v=pw.value;
    const upper=(v.match(/[A-Z]/g)||[]).length;
    const digit=(v.match(/[0-9]/g)||[]).length;
    const glyph=[...v].filter(c=>HG.includes(c)).length;
    const tokens=v.split(/[^A-Za-z]+/).filter(Boolean);
    const misspelled=tokens.filter(looksLikeMisspelling);
    const RULES=[
      ["exactly one UPPERCASE letter",upper===1],
      ["exactly one number",digit===1],
      ["exactly one hieroglyph 𓂀 (tap one above)",glyph===1],
      ["exactly one MISSPELLED English word (e.g. 'freind', 'teh', 'wrold')",misspelled.length===1],
    ];
    const rules=document.getElementById("rules");rules.innerHTML="";
    let all=true;
    RULES.forEach(([t,ok])=>{if(!ok)all=false;const d=document.createElement("div");d.className="rule "+(ok?"ok":"no");
      d.innerHTML=`<span class="i">${ok?"✓":"✗"}</span><span>${t}</span>`;rules.appendChild(d);});
    if(misspelled.length===1){const d=document.createElement("div");d.className="rule";d.style.color="#7a8aa5";d.innerHTML=`<span class="i"></span><span>detected misspelling: "${misspelled[0]}"</span>`;rules.appendChild(d);}
    document.getElementById("submit").disabled=!all;
  }
  pw.addEventListener("input",check);check();
  document.getElementById("submit").onclick=()=>{document.getElementById("box").innerHTML="<h2 style='color:#3dff7a'>✓ Account created</h2><p>Against all odds, you produced exactly one of each — including precisely one believable typo. The system is delighted and a little unsettled.</p>";};
  </script>
</body></html>
