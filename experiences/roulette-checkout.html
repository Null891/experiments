<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>The Roulette Checkout</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0c1a10;color:#fff;font-family:"Segoe UI",sans-serif}
  #wrap{max-width:520px;margin:0 auto;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center}
  #c{margin:16px 0}
  .item{background:#102a18;border:1px solid #1d4a2e;border-radius:10px;padding:14px 22px;font-size:18px}
  #buy{background:#e2b13b;border:0;color:#201400;padding:16px 40px;border-radius:10px;font-size:18px;font-weight:800;cursor:pointer;margin-top:8px}
  #buy:disabled{opacity:.5;cursor:wait}
  #res{font-size:22px;font-weight:800;min-height:30px;margin-top:10px}
  #ban{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(20,0,0,.95);text-align:center;z-index:9}
  #ban h1{color:#ff5252;font-size:40px}
  .odds{font-size:12px;opacity:.6}
</style></head>
<body>
  <div id="wrap">
    <h2>🎰 Checkout</h2>
    <div class="item">🎧 Premium Headphones — <b>$189</b></div>
    <canvas id="c" width="280" height="280"></canvas>
    <button id="buy">SPIN TO BUY</button>
    <div id="res"></div>
    <div class="odds">Black = purchase confirmed · Red = cart emptied + 24h ban · Green 0 = free</div>
  </div>
  <div id="ban"><h1>⛔ BANNED</h1><p>The wheel landed on red. Your cart is empty and you are banned for 24 hours.</p>
    <p style="font-size:13px;opacity:.7">(time remaining: <span id="cd">23:59:58</span>)</p>
    <button id="appeal" style="margin-top:14px;background:#444;border:0;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer">Beg for an appeal</button></div>
  <script src="_sound.js"></script>
  <script>
  const cv=document.getElementById("c"),x=cv.getContext("2d"),CX=140,CY=140,R=130;
  // 37 european-style pockets
  const N=37;const reds=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
  function colorOf(n){return n===0?"#1a8a3a":reds.has(n)?"#c0392b":"#16181d";}
  let ang=0,spinning=false,vel=0;
  function draw(){
    x.clearRect(0,0,280,280);
    for(let i=0;i<N;i++){const a0=ang+i/N*Math.PI*2,a1=ang+(i+1)/N*Math.PI*2;
      x.beginPath();x.moveTo(CX,CY);x.arc(CX,CY,R,a0,a1);x.closePath();x.fillStyle=colorOf(i);x.fill();
      x.save();x.translate(CX,CY);x.rotate((a0+a1)/2);x.fillStyle="#fff";x.font="10px Segoe UI";x.textAlign="right";x.fillText(i,R-6,3);x.restore();}
    // pointer
    x.fillStyle="#ffd23f";x.beginPath();x.moveTo(CX,4);x.lineTo(CX-10,-14);x.lineTo(CX+10,-14);x.closePath();x.fill();
    x.beginPath();x.arc(CX,CY,18,0,7);x.fillStyle="#0c1a10";x.fill();
  }
  function pocketAtTop(){
    // which pocket index is under the top pointer (angle pointing up = -PI/2)
    const top=(-Math.PI/2 - ang)%(Math.PI*2);const norm=((top%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    return Math.floor(norm/(Math.PI*2)*N)%N;
  }
  function spin(){
    if(spinning)return;spinning=true;document.getElementById("buy").disabled=true;document.getElementById("res").textContent="";
    vel=0.4+Math.random()*0.25;
    (function anim(){ang+=vel;vel*=0.985;draw();
      if(window.MXA && Math.random()<vel*7) MXA.tick();
      if(vel>0.002)requestAnimationFrame(anim);
      else{spinning=false;document.getElementById("buy").disabled=false;result(pocketAtTop());}})();
  }
  function result(n){
    const res=document.getElementById("res");
    if(n===0){res.style.color="#3dff7a";res.textContent="🍀 GREEN 0 — It's free! The house made a mistake. Take it and run.";if(window.MXA)MXA.coin();}
    else if(reds.has(n)){res.style.color="#ff5252";res.textContent="🔴 RED "+n+" — Cart emptied. You are banned.";if(window.MXA){MXA.error();MXA.explosion();}
      setTimeout(()=>{document.getElementById("ban").style.display="flex";startCd();},800);}
    else{res.style.color="#9fe";res.textContent="⚫ BLACK "+n+" — Purchase confirmed! Headphones are yours.";if(window.MXA)MXA.chime(880);}
  }
  function startCd(){let s=24*3600-2;const el=document.getElementById("cd");
    setInterval(()=>{s--;const h=String(s/3600|0).padStart(2,"0"),m=String((s%3600)/60|0).padStart(2,"0"),ss=String(s%60).padStart(2,"0");el.textContent=`${h}:${m}:${ss}`;},1000);}
  document.getElementById("buy").onclick=spin;
  document.getElementById("appeal").onclick=()=>{document.getElementById("ban").innerHTML="<h1 style='color:#3dff7a'>Appeal granted</h1><p>The house is feeling generous. Ban lifted. Spin responsibly.</p><button style='margin-top:14px;background:#444;border:0;color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer' onclick='document.getElementById(\"ban\").style.display=\"none\"'>Back to checkout</button>";};
  draw();
  </script>
</body></html>
