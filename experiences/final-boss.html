<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>The Final Boss Website</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05030a;cursor:none;font-family:"Segoe UI",sans-serif;color:#fff}
  #c{position:fixed;inset:0;display:block}
  #ui{position:fixed;left:0;top:0;width:100%;padding:10px 16px;display:flex;justify-content:space-between;z-index:3;pointer-events:none;text-shadow:0 1px 4px #000}
  #hpbar{position:fixed;left:50%;top:12px;transform:translateX(-50%);width:60%;height:14px;border:2px solid #ff3b3b;border-radius:8px;overflow:hidden;background:#200}
  #hpfill{height:100%;width:100%;background:linear-gradient(90deg,#ff3b3b,#ff8a3b);transition:width .15s}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;background:rgba(5,3,10,.82);text-align:center}
  .btn{margin-top:18px;background:#ff3b3b;color:#fff;border:0;padding:13px 26px;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer;pointer-events:auto}
  h1{font-size:38px;margin:0 0 6px;letter-spacing:1px}
  small{opacity:.7}
</style></head>
<body>
  <canvas id="c"></canvas>
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="ui"><div id="msg">DEV.exe — THE FINAL BOSS</div><div id="score">SECTOR 1</div></div>
  <div id="overlay">
    <h1>⚔ THE FINAL BOSS</h1>
    <p>The developer guards their résumé. Defeat their avatar to download it.<br>
       <small>Move with the mouse. You auto-fire. Dodge everything. Survive the patterns.</small></p>
    <button class="btn" id="start">FIGHT</button>
  </div>
  <script>
  const cv=document.getElementById("c"),x=cv.getContext("2d");
  let W,H;function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}rs();addEventListener("resize",rs);
  const me={x:innerWidth/2,y:innerHeight*0.8,r:7,alive:true};
  addEventListener("mousemove",e=>{me.x=e.clientX;me.y=e.clientY;});
  let myb=[],eb=[],parts=[],boss,running=false,phase=0,t=0,fireT=0;

  function reset(){ boss={x:W/2,y:120,r:46,hp:1000,max:1000,t:0,pat:0,patT:0,dx:1.4};
    myb=[];eb=[];parts=[];running=true;me.alive=true;phase=0;t=0; }
  function spark(px,py,c,n){for(let i=0;i<n;i++){const a=Math.random()*7,s=1+Math.random()*5;parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c});}}

  function eShot(px,py,ang,sp,c){eb.push({x:px,y:py,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r:6,c:c||"#ff5bce"});}
  function bossFire(){
    boss.patT++;
    const p=boss.pat;
    if(p===0){ // radial bursts
      if(boss.patT%26===0){for(let i=0;i<26;i++)eShot(boss.x,boss.y,(i/26)*7+boss.t*0.05,3.2,"#ff5bce");}
    } else if(p===1){ // spiral
      if(boss.patT%2===0){const a=boss.t*0.22;for(let k=0;k<3;k++)eShot(boss.x,boss.y,a+k*2.1,3.6,"#9b6bff");}
    } else if(p===2){ // aimed shotgun
      if(boss.patT%34===0){const base=Math.atan2(me.y-boss.y,me.x-boss.x);for(let i=-3;i<=3;i++)eShot(boss.x,boss.y,base+i*0.16,5,"#ff8a3b");}
    } else { // rings + aimed
      if(boss.patT%40===0){for(let i=0;i<40;i++)eShot(boss.x,boss.y,(i/40)*7,2.6,"#3bffea");}
      if(boss.patT%20===0){const base=Math.atan2(me.y-boss.y,me.x-boss.x);eShot(boss.x,boss.y,base,6,"#fff");}
    }
    if(boss.patT>360){boss.patT=0;boss.pat=(boss.pat+1)%4;}
  }

  function frame(){
    requestAnimationFrame(frame);
    x.fillStyle="rgba(5,3,10,.35)";x.fillRect(0,0,W,H);
    // starfield
    if(!running) return drawStars();
    t++;boss.t++;
    // boss movement
    boss.x+=boss.dx*(1.5+phase); if(boss.x<70||boss.x>W-70)boss.dx*=-1;
    boss.y=110+Math.sin(t*0.02)*40;
    bossFire();
    // draw boss
    x.save();x.translate(boss.x,boss.y);
    const g=x.createRadialGradient(0,0,4,0,0,boss.r);g.addColorStop(0,"#fff");g.addColorStop(.4,"#ff3b3b");g.addColorStop(1,"#660018");
    x.fillStyle=g;x.beginPath();x.arc(0,0,boss.r,0,7);x.fill();
    x.fillStyle="#fff";x.font="22px Segoe UI";x.textAlign="center";x.fillText("</>",0,8);
    x.restore();
    // my auto fire
    if(me.alive&&++fireT%5===0){myb.push({x:me.x,y:me.y-8,vy:-11});myb.push({x:me.x-6,y:me.y-4,vy:-11});myb.push({x:me.x+6,y:me.y-4,vy:-11});}
    myb=myb.filter(b=>b.y>-20);
    myb.forEach(b=>{b.y+=b.vy;x.fillStyle="#8df0ff";x.fillRect(b.x-2,b.y-8,4,12);
      if(Math.hypot(b.x-boss.x,b.y-boss.y)<boss.r){boss.hp-=6;b.y=-99;spark(b.x,b.y,"#ff8a3b",4);}});
    boss.hp=Math.max(0,boss.hp);
    document.getElementById("hpfill").style.width=(boss.hp/boss.max*100)+"%";
    phase=boss.hp<boss.max*0.66?(boss.hp<boss.max*0.33?2:1):0;
    document.getElementById("score").textContent="SECTOR "+(phase+1);
    if(boss.hp<=0){win();}
    // enemy bullets
    eb=eb.filter(b=>b.x>-30&&b.x<W+30&&b.y>-30&&b.y<H+30);
    eb.forEach(b=>{b.x+=b.vx;b.y+=b.vy;x.fillStyle=b.c;x.beginPath();x.arc(b.x,b.y,b.r,0,7);x.fill();
      if(me.alive&&Math.hypot(b.x-me.x,b.y-me.y)<b.r+me.r){hit();}});
    // particles
    parts=parts.filter(p=>p.life>0);
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.03;x.globalAlpha=p.life;x.fillStyle=p.c;x.fillRect(p.x,p.y,3,3);});
    x.globalAlpha=1;
    // player
    if(me.alive){x.save();x.translate(me.x,me.y);x.fillStyle="#8df0ff";x.beginPath();
      x.moveTo(0,-12);x.lineTo(9,10);x.lineTo(0,5);x.lineTo(-9,10);x.closePath();x.fill();
      x.strokeStyle="#fff";x.globalAlpha=.5;x.beginPath();x.arc(0,0,me.r,0,7);x.stroke();x.restore();x.globalAlpha=1;}
  }
  let stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,z:Math.random()});
  function drawStars(){x.fillStyle="#000";stars.forEach(s=>{s.y+=s.z*0.6;if(s.y>H)s.y=0;x.fillStyle=`rgba(180,200,255,${s.z})`;x.fillRect(s.x,s.y,s.z*2,s.z*2);});}
  function hit(){ me.alive=false; spark(me.x,me.y,"#8df0ff",40);
    setTimeout(()=>{ if(!running)return; over("YOU WERE DELETED","The boss compiled you out of existence.","RESPAWN & FIGHT AGAIN"); },700); running=false; }
  function win(){ running=false; spark(boss.x,boss.y,"#ff8a3b",120);
    setTimeout(()=>over("BOSS DEFEATED ⭐","The résumé is yours. (download unlocked)","Download résumé.pdf",true),600); }
  function over(title,sub,btn,won){
    const o=document.getElementById("overlay");o.style.display="flex";
    o.innerHTML=`<h1>${title}</h1><p>${sub}</p><button class="btn" id="again">${btn}</button>`;
    document.getElementById("again").onclick=()=>{ if(won){const a=document.createElement("a");
      a.href="data:text/plain,RESUME%0A%0AName%3A The%20Developer%0ASkill%3A Surviving%20bullet%20hell%0AAchievement%3A You%20beat%20the%20boss.";
      a.download="resume.txt";a.click();} o.style.display="none";reset(); };
  }
  document.getElementById("start").onclick=()=>{document.getElementById("overlay").style.display="none";reset();};
  frame();
  </script>
</body></html>
